function nitsRamp(x,w,h){

function rgbBalance(x,w,h){
x.fillStyle='#000';x.fillRect(0,0,w,h);

  {x0:0,x1:w/3,top:[1,0,0],mid:[0.8,0.8,0.8],bot:[0,1,1],title:'1.000,0.000,0.000'},

function mix(a,b,t){return a+(b-a)*t}

sections.forEach(sec=>{

    }else{
      let k=(t-.5)/.5;

}
